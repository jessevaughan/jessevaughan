name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - name: Deploy to DreamHost
        env:
          SSH_KEY: ${{ secrets.DREAMHOST_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -v ${{ secrets.DREAMHOST_HOST }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -v ${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }} "echo connected"
          rsync -avz --delete dist/ \
            -e "ssh -i ~/.ssh/deploy_key" \
            ${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }}:${{ secrets.DREAMHOST_PATH }}/